name: Deploy Staging
on:
  push:
    branches: [develop]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & Push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: |
            ${{ secrets.REGISTRY }}/fiberops-api:staging-${{ github.sha }}
            ${{ secrets.REGISTRY }}/fiberops-api:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          tags: |
            ${{ secrets.REGISTRY }}/fiberops-web:staging-${{ github.sha }}
            ${{ secrets.REGISTRY }}/fiberops-web:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to staging server
        run: |
          echo "Deploy to staging: update docker-compose.prod.yml images and restart"
          # ssh deploy@staging "cd /opt/fiberops && docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d"

      - name: Health check
        run: |
          for i in $(seq 1 30); do
            curl -sf ${{ secrets.STAGING_URL }}/api/v1/health && exit 0 || sleep 5
          done
          exit 1
