name: Deploy Production
on:
  push:
    tags: ['v*.*.*']

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & Push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: |
            ${{ secrets.REGISTRY }}/fiberops-api:${{ env.VERSION }}
            ${{ secrets.REGISTRY }}/fiberops-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          tags: |
            ${{ secrets.REGISTRY }}/fiberops-web:${{ env.VERSION }}
            ${{ secrets.REGISTRY }}/fiberops-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to production
        run: |
          echo "🚀 Deploying FiberOps PH ${{ env.VERSION }} to production"
          # ssh deploy@prod "cd /opt/fiberops && docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d"

      - name: Run database migrations
        run: |
          echo "Running Prisma migrations on production database..."
          # ssh deploy@prod "docker compose -f docker-compose.prod.yml exec api npx prisma migrate deploy"

      - name: Health check
        run: |
          curl -sf ${{ secrets.PROD_URL }}/api/v1/health || exit 1

      - name: Notify team
        run: echo "🚀 FiberOps PH ${{ env.VERSION }} deployed to production"
