version: '3.8'

services:
  # =========================================================
  # Database Layer
  # =========================================================
  postgres:
    image: postgres:16-alpine
    container_name: fiberops-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fiberops}
      POSTGRES_USER: ${POSTGRES_USER:-fiberops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-fiberops}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fiberops

  redis:
    image: redis:7-alpine
    container_name: fiberops-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-fiberops_redis}
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-fiberops_redis}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fiberops

  # =========================================================
  # Application Layer
  # =========================================================
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: fiberops-api
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-fiberops}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-fiberops}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-fiberops_redis}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      API_PORT: 3001
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fiberops

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: fiberops-web
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api/v1}
    depends_on:
      - api
    networks:
      - fiberops

  # =========================================================
  # Reverse Proxy
  # =========================================================
  nginx:
    image: nginx:alpine
    container_name: fiberops-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - web
    networks:
      - fiberops

volumes:
  pgdata:
  redisdata:

networks:
  fiberops:
    driver: bridge
