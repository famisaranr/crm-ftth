version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: fiberops-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: fiberops
      POSTGRES_USER: fiberops
      POSTGRES_PASSWORD: fiberops_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fiberops']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fiberops-redis
    ports:
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    container_name: fiberops-mailhog
    ports:
      - '1025:1025'
      - '8025:8025'

volumes:
  pgdata:
